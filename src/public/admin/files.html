<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Uploader — All Files</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9; color: #1e293b; display: flex; min-height: 100vh;
    }

    /* ── Sidebar (shared) ── */
    .sidebar { width: 240px; min-width: 240px; background: #1e293b; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; }
    .sidebar-brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar-brand .icon { width: 48px; height: 48px; border-radius: 8px; margin-bottom: 10px; object-fit: contain; }
    .sidebar-brand h1 { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
    .sidebar-brand p { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }
    nav { flex: 1; padding: 16px 12px; }
    .nav-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #475569; padding: 0 8px; margin: 16px 0 6px; }
    .nav-label:first-child { margin-top: 0; }
    nav a { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 7px; color: #94a3b8; text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: background 0.12s, color 0.12s; }
    nav a svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    nav a:hover { background: rgba(255,255,255,0.06); color: #f1f5f9; }
    nav a.active { background: rgba(37,99,235,0.2); color: #93c5fd; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
    .logout-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 10px; background: none; border: none; border-radius: 7px; color: #94a3b8; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background 0.12s, color 0.12s; }
    .logout-btn svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logout-btn:hover { background: rgba(239,68,68,0.12); color: #fca5a5; }

    /* ── Main ── */
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 14px 28px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .topbar h2 { font-size: 1.1rem; font-weight: 600; margin-right: auto; }

    .filter-select {
      padding: 7px 12px; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 0.875rem; color: #374151; background: #fff; outline: none; cursor: pointer;
      transition: border-color 0.15s;
    }
    .filter-select:focus { border-color: #2563eb; }

    .total-label { font-size: 0.8125rem; color: #64748b; white-space: nowrap; }

    .content { padding: 28px; }

    /* ── File grid ── */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .file-card {
      background: #fff; border-radius: 11px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07); overflow: hidden;
      display: flex; flex-direction: column;
    }

    .file-thumb {
      width: 100%; aspect-ratio: 1; overflow: hidden; position: relative;
      background: #f8fafc; display: flex; align-items: center; justify-content: center;
    }
    .file-thumb a { display: block; width: 100%; height: 100%; }
    .file-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.15s; }
    .file-thumb img:hover { opacity: 0.9; }

    .type-icon {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      text-decoration: none;
    }
    .type-icon .ext {
      font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    }
    .type-icon svg { width: 28px; height: 28px; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    .type-pdf   { background: #fef2f2; } .type-pdf   .ext, .type-pdf   svg { color: #dc2626; stroke: #dc2626; }
    .type-image { background: #eff6ff; } .type-image .ext, .type-image svg { color: #2563eb; stroke: #2563eb; }
    .type-video { background: #f5f3ff; } .type-video .ext, .type-video svg { color: #7c3aed; stroke: #7c3aed; }
    .type-audio { background: #f0fdf4; } .type-audio .ext, .type-audio svg { color: #16a34a; stroke: #16a34a; }
    .type-doc   { background: #eff6ff; } .type-doc   .ext, .type-doc   svg { color: #0284c7; stroke: #0284c7; }
    .type-other { background: #f8fafc; } .type-other .ext, .type-other svg { color: #64748b; stroke: #64748b; }

    .file-meta { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .file-meta .fname { font-size: 0.875rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #1e293b; }
    .share-badge {
      display: inline-flex; align-items: center;
      background: #eff6ff; color: #2563eb; border-radius: 99px;
      padding: 2px 8px; font-size: 0.7rem; font-weight: 600; width: fit-content;
    }
    .file-meta .by   { font-size: 0.78rem; color: #475569; }
    .file-meta .cmt  { font-size: 0.78rem; color: #64748b; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta .info { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }

    .file-actions { padding: 0 14px 12px; display: flex; gap: 8px; }
    .btn-view {
      flex: 1; padding: 6px; border-radius: 7px; border: 1px solid #e2e8f0;
      background: #fff; color: #374151; font-size: 0.8rem; font-weight: 500;
      cursor: pointer; text-align: center; text-decoration: none; display: inline-block;
      transition: background 0.12s;
    }
    .btn-view:hover { background: #f8fafc; }
    .btn-del {
      padding: 6px 10px; border-radius: 7px; border: 1px solid #fca5a5;
      background: #fff; color: #dc2626; font-size: 0.8rem; font-weight: 500; cursor: pointer;
      transition: background 0.12s;
    }
    .btn-del:hover { background: #fef2f2; }

    /* ── Empty / loading ── */
    .empty {
      grid-column: 1 / -1; text-align: center; padding: 64px 28px;
      background: #fff; border-radius: 11px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .empty svg { width: 40px; height: 40px; stroke: #cbd5e1; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 12px; }
    .empty p { color: #94a3b8; font-size: 0.9rem; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img class="icon" src="/icon.png" alt="Easy Uploader">
      <h1>Easy Uploader</h1>
      <p>Admin Panel</p>
    </div>
    <nav>
      <div class="nav-label">Manage</div>
      <a href="/admin/dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
        Dashboard
      </a>
      <a href="/admin/shares">
        <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
        Shares
      </a>
      <a href="/admin/files" class="active">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
        All Files
      </a>
    </nav>
    <div class="sidebar-footer">
      <form method="POST" action="/admin/logout">
        <button type="submit" class="logout-btn">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Sign Out
        </button>
      </form>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h2>All Files</h2>
      <span class="total-label" id="totalLabel"></span>
      <select class="filter-select" id="shareFilter" onchange="applyFilter()">
        <option value="">All Shares</option>
      </select>
    </div>

    <div class="content">
      <div class="file-grid" id="fileGrid">
        <div class="empty">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          <p>Loading files…</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allFiles  = [];
    let allShares = [];

    async function init() {
      const [filesRes, sharesRes] = await Promise.all([
        fetch('/admin/api/files'),
        fetch('/admin/api/shares'),
      ]);
      allFiles  = await filesRes.json();
      allShares = await sharesRes.json();
      populateFilter();
      renderFiles(allFiles);
    }

    function populateFilter() {
      const sel = document.getElementById('shareFilter');
      allShares.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name;
        sel.appendChild(opt);
      });
    }

    function applyFilter() {
      const shareId = document.getElementById('shareFilter').value;
      const filtered = shareId ? allFiles.filter(f => String(f.share_slug) === allShares.find(s => s.id == shareId)?.slug) : allFiles;
      // Re-fetch with server filter for accuracy
      const url = shareId ? `/admin/api/files?share_id=${shareId}` : '/admin/api/files';
      fetch(url).then(r => r.json()).then(renderFiles);
    }

    function renderFiles(files) {
      const grid = document.getElementById('fileGrid');
      const n = files.length;
      document.getElementById('totalLabel').textContent = n === 0 ? '' : `${n} file${n !== 1 ? 's' : ''}`;

      if (files.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            <p>No files uploaded yet.</p>
          </div>`;
        return;
      }

      grid.innerHTML = files.map(f => {
        const viewUrl = `/admin/uploads/${esc(f.share_slug)}/${esc(f.stored_name)}`;
        const thumb   = buildThumb(f, viewUrl);
        const ext     = f.original_name.includes('.') ? f.original_name.split('.').pop().toUpperCase() : '';
        return `
          <div class="file-card" id="fc-${f.id}">
            <div class="file-thumb">${thumb}</div>
            <div class="file-meta">
              <div class="fname" title="${esc(f.original_name)}">${esc(f.original_name)}</div>
              <div class="share-badge">${esc(f.share_name)}</div>
              <div class="by">by ${esc(f.submitted_by)}</div>
              ${f.comment ? `<div class="cmt">${esc(f.comment)}</div>` : ''}
              <div class="info">${fmtBytes(f.size_bytes)} &middot; ${fmtDate(f.uploaded_at)}</div>
            </div>
            <div class="file-actions">
              <a class="btn-view" href="${viewUrl}" target="_blank">View</a>
              <button class="btn-del" onclick="deleteFile(${f.id}, '${escJs(f.original_name)}')">Delete</button>
            </div>
          </div>`;
      }).join('');
    }

    function buildThumb(f, viewUrl) {
      if (f.mime_type && f.mime_type.startsWith('image/')) {
        return `<a href="${viewUrl}" target="_blank"><img src="${viewUrl}" loading="lazy" alt="${esc(f.original_name)}"></a>`;
      }
      const { cls, icon } = typeInfo(f.mime_type, f.original_name);
      const ext = f.original_name.includes('.') ? f.original_name.split('.').pop().slice(0, 5).toUpperCase() : 'FILE';
      return `
        <a class="type-icon ${cls}" href="${viewUrl}" target="_blank" title="View ${esc(f.original_name)}">
          ${icon}
          <span class="ext">${esc(ext)}</span>
        </a>`;
    }

    function typeInfo(mime, name) {
      const m = mime || '';
      if (m.startsWith('video/'))
        return { cls: 'type-video', icon: '<svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>' };
      if (m.startsWith('audio/'))
        return { cls: 'type-audio', icon: '<svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>' };
      if (m === 'application/pdf')
        return { cls: 'type-pdf',   icon: '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>' };
      if (m.includes('word') || m.includes('document') || m.includes('text'))
        return { cls: 'type-doc',   icon: '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>' };
      return { cls: 'type-other', icon: '<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>' };
    }

    async function deleteFile(id, name) {
      if (!confirm(`Delete "${name}"?\n\nThis file will be permanently removed.`)) return;
      const res = await fetch(`/admin/api/files/${id}`, { method: 'DELETE' });
      if (res.ok) {
        document.getElementById(`fc-${id}`)?.remove();
        allFiles = allFiles.filter(f => f.id !== id);
        const n = document.querySelectorAll('.file-card').length;
        document.getElementById('totalLabel').textContent = n === 0 ? '' : `${n} file${n !== 1 ? 's' : ''}`;
        if (n === 0) applyFilter();
      }
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escJs(str) { return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
    function fmtBytes(b) {
      if (!b) return '—';
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
      return (b/1048576).toFixed(1) + ' MB';
    }
    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    init();
  </script>
</body>
</html>
